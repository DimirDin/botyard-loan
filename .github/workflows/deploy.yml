name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          rsync -a --exclude='.env' --exclude='.git' . /srv/apps/botyard-loan/
          cd /srv/apps/botyard-loan
          docker compose build
          docker compose up -d
          docker compose ps
