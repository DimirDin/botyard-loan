services:
  backend:
    build: ./backend
    container_name: loan_backend
    restart: unless-stopped
    env_file: .env
    networks:
      - loan_net
      - platform_default

  bot:
    build: ./backend
    container_name: loan_bot
    restart: unless-stopped
    env_file: .env
    command: python -m app.bot.main
    networks:
      - loan_net
      - platform_default
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
    container_name: loan_frontend
    restart: unless-stopped
    ports:
      - "3003:80"
    networks:
      - loan_net
    depends_on:
      - backend

networks:
  loan_net:
    driver: bridge
  platform_default:
    external: true
